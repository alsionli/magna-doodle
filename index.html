<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Magnetic Drawing Board</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="page">
    <div class="toy-board">

      <div class="board-title"><span class="title-badge">Magna</span> <span class="title-text">Doodle</span></div>

      <div class="body">

        <div class="panel left-panel">
          <button class="tool-btn pen-pebble active" data-tool="pen" title="Draw">
            <svg class="pen-icon" viewBox="0 0 24 24" width="38" height="38" fill="#A06800">
              <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/>
            </svg>
          </button>
          <div class="panel-divider"></div>
          <button class="tool-btn stamp-shape stamp-circle" data-tool="stamp-circle" title="Circle Stamp"></button>
          <button class="tool-btn stamp-shape stamp-triangle" data-tool="stamp-triangle" title="Triangle Stamp"></button>
          <button class="tool-btn stamp-shape stamp-star" data-tool="stamp-star" title="Star Stamp"></button>
          <button class="tool-btn stamp-shape stamp-heart" data-tool="stamp-heart" title="Heart Stamp"></button>
        </div>

        <div class="canvas-bezel">
          <div class="canvas-wrapper">
            <canvas id="drawCanvas"></canvas>
            <div class="stamp-cursor" id="stampCursor"></div>
          </div>
        </div>

        <div class="panel right-panel">
          <div class="color-section">
            <button class="color-btn active" data-color="#384259" style="--c:#384259" title="Dark Gray"></button>
            <button class="color-btn" data-color="#E74C3C" style="--c:#E74C3C" title="Red"></button>
            <button class="color-btn" data-color="#2980B9" style="--c:#2980B9" title="Blue"></button>
            <button class="color-btn" data-color="#27AE60" style="--c:#27AE60" title="Green"></button>
            <button class="color-btn" data-color="#F39C12" style="--c:#F39C12" title="Orange"></button>
            <button class="color-btn" data-color="#8E44AD" style="--c:#8E44AD" title="Purple"></button>
            <label class="color-btn color-custom-label" title="Custom Color">
              <input type="color" id="customColor" value="#384259">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 2a10 10 0 0 1 0 20 10 10 0 0 1 0-20" stroke="none" fill="url(#cw)"/><defs><linearGradient id="cw" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E74C3C"/><stop offset="25%" stop-color="#F39C12"/><stop offset="50%" stop-color="#27AE60"/><stop offset="75%" stop-color="#2980B9"/><stop offset="100%" stop-color="#8E44AD"/></linearGradient></defs></svg>
            </label>
          </div>
          <div class="panel-divider"></div>
          <div class="size-section">
            <div class="knob-wrap">
              <span class="knob-tick knob-tick-0"></span>
              <span class="knob-tick knob-tick-1"></span>
              <span class="knob-tick knob-tick-2"></span>
              <button class="knob" id="sizeKnob" data-pos="0" title="Brush Size">
                <span class="knob-indicator"></span>
              </button>
            </div>
          </div>
        </div>

      </div>

      <div class="bottom">
        <div class="slider-track" id="sliderTrack">
          <div class="slider-fill" id="sliderFill"></div>
          <div class="slider-handle" id="sliderHandle">
            <div class="slider-grip"></div>
            <div class="slider-grip"></div>
            <div class="slider-grip"></div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <svg width="0" height="0" style="position:absolute">
    <defs>
      <clipPath id="heartClip" clipPathUnits="objectBoundingBox">
        <path d="M0.5,0.92 C0.5,0.92,0.02,0.55,0.02,0.3 C0.02,0.12,0.17,0.02,0.32,0.08 C0.4,0.12,0.47,0.2,0.5,0.28 C0.53,0.2,0.6,0.12,0.68,0.08 C0.83,0.02,0.98,0.12,0.98,0.3 C0.98,0.55,0.5,0.92,0.5,0.92Z"/>
      </clipPath>
    </defs>
  </svg>

  <script type="module" src="js/app.js"></script>
</body>
</html>
